name: Build App on new release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*'

jobs:
  build:
    name: Build, sign and release app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up jdk
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Prepare release signing
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in KEYSTORE SIGNING_KEY_ALIAS SIGNING_STORE_PASSWORD SIGNING_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Repository secret ${name} is not configured"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          mkdir -p release
          printf '%s' "${KEYSTORE}" | base64 --decode > release/psychonautwiki-journal-release.jks
          {
            printf 'storeFile=release/psychonautwiki-journal-release.jks\n'
            printf 'storePassword=%s\n' "${SIGNING_STORE_PASSWORD}"
            printf 'keyAlias=%s\n' "${SIGNING_KEY_ALIAS}"
            printf 'keyPassword=%s\n' "${SIGNING_KEY_PASSWORD}"
          } > release/signing.properties

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk "psychonautwiki-journal_${{ github.ref_name }}.apk"

      # Uploads to the action results if not pointed at a tag
      - uses: actions/upload-artifact@v7
        if: "! startsWith(github.ref, 'refs/tags/')"
        with:
          name: "psychonautwiki-journal_${{ github.ref_name }}.apk"
          path: "psychonautwiki-journal_${{ github.ref_name }}.apk"
          if-no-files-found: error

      # Creates a release if pointed at a tag
      - name: Create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "psychonautwiki-journal_${{ github.ref_name }}.apk"
          fail_on_unmatched_files: true
          make_latest: true
